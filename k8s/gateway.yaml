apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gke-http-gateway
  namespace: default
spec:
  gatewayClassName: gke-l7-global-external-managed
  addresses:
    - type: NamedAddress
      value: nginx-airnes
  listeners:
    - name: http
      protocol: HTTP
      port: 80
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        options:
          networking.gke.io/pre-shared-certs: managed-cert

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api-route
spec:
  parentRefs:
    - name: gke-http-gateway
  hostnames:
    - api.airnes.tsiang.fr
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: api-service
          port: 9000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: redirect-http-to-https
spec:
  parentRefs:
    - name: gke-http-gateway
      sectionName: http
  hostnames:
    - api.airnes.tsiang.fr
  filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
spec:
  parentRefs:
    - name: gke-http-gateway
      sectionName: http
  hostnames:
    - airnes.tsiang.fr
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend-service-site
          port: 80

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: redirect-http-to-https-frontend
spec:
  parentRefs:
    - name: gke-http-gateway
      sectionName: http
  hostnames:
    - airnes.tsiang.fr
  filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
