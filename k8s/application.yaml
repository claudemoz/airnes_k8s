apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: airnes-e-commerce-site
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/claudemoz/airnes_k8s.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
